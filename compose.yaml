services:
  mirakc:
    build:
      context: mirakc
      dockerfile: Dockerfile
    init: false
    restart: unless-stopped
    ports:
      - 40772:40772
    devices:
      - /dev/px4video0
      - /dev/px4video1
      - /dev/px4video2
      - /dev/px4video3
      - /dev/pxmlt8video0
      - /dev/pxmlt8video1
      - /dev/pxmlt8video2
      - /dev/pxmlt8video3
      - /dev/pxmlt8video4
      - /dev/pxmlt8video5
      - /dev/pxmlt8video6
      - /dev/pxmlt8video7
    volumes:
      - ./mirakc/config.yml:/etc/mirakc/config.yml:ro
      - mirakc-epg:/var/lib/mirakc/epg/
      - miraview-html:/var/www/miraview:ro
    environment:
      TZ: Asia/Tokyo
      MIRAKC_ARIB_LOG_NO_TIMESTAMP: 1
      MIRAKC_ARIG_LOG: info
      RUST_LOG: info,mirakc=debug

  mariadb:
    image: mariadb:10.5
    volumes:
      - mariadb-db:/var/lib/mysql
    environment:
      MYSQL_USER: epgstation
      MYSQL_PASSWORD: epgstation
      MYSQL_ROOT_PASSWORD: epgstation
      MYSQL_DATABASE: epgstation
      TZ: "Asia/Tokyo"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --performance-schema=false --expire_logs_days=1 # for mariadb
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
        max-file: 3
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  konomitv:
    build:
      context: konomitv
      dockerfile: Dockerfile
    restart: unless-stopped
    runtime: nvidia
    # network_mode: host
    ports:
      - 7000:7000
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu,video,utility]
    volumes:
      - ./konomitv/config.yaml:/code/config.yaml:ro
      - ./konomitv/server/data:/code/server/data/
      - ./konomitv/server/logs:/code/server/logs/
      - /mnt/sda1/:/host-rootfs/

  epgstation:
    build:
      context: epgstation
      dockerfile: nvenc.Dockerfile 
    restart: unless-stopped
    runtime: nvidia
    environment:
      TZ: "Asia/Tokyo"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu,video,utility]
    volumes:
      - ./epgstation/config:/app/config
      - ./epgstation/data:/app/data
      - ./epgstation/logs:/app/logs
      - ./epgstation/recorded_tmp:/app/recorded_tmp
      - ./epgstation/thumbnail:/app/thumbnail
      - ./epgstation/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./epgstation/patch.sh:/usr/local/bin/patch.sh:ro
      - /mnt/sda1/encoded:/app/encoded
      - /mnt/sda1/recorded:/app/recorded
      - /mnt/sda1/thumbnail:/app/thumbnail
    # entrypoint:
    #   - /usr/local/bin/docker-entrypoint.sh
    # command:
    #   - npm
    #   - start
    depends_on:
      mirakc:
        condition: service_started
      mariadb:
        condition: service_healthy
    ports:
      - 8888:8888
      - 8443:8443

  miraview:
    container_name: miraview
    image: docker.io/mirakc/mirakc:alpine
    restart: "no"
    volumes:
      - miraview-html:/var/www/miraview
    working_dir: /var/www/miraview
    environment:
      MIRAVIEW_VERSION: v0.1.2
    entrypoint: ash
    command: -c "curl -L https://github.com/maeda577/miraview/releases/download/$$MIRAVIEW_VERSION/build.tar.gz | tar -zxvf -"

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --autoupdate-freq 12h run
    environment:
      TUNNEL_TOKEN: $TUNNEL_TOKEN
      NO_AUTOUPDATE: false
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  mirakc-epg:
    name: mirakc-epg
    driver: local
  mariadb-db:
    name: mariadb-db
  miraview-html:
    name: miraview_html
    driver: local
